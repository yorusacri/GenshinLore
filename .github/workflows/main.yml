name: Update File Tree in README
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate file tree from GitHub API
        run: |
          # 下载文件树 JSON（使用 GITHUB_TOKEN 避免频率限制）
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "https://api.github.com/repos/Dennis114514/GenshinLore/git/trees/main?recursive=1" \
               > tree.json

          # 内嵌 Python 脚本生成树形文本
          python3 << 'EOF' > tree.md
          import json
          from collections import defaultdict

          def build_tree(items):
              tree = {}
              for item in items:
                  parts = item['path'].split('/')
                  node = tree
                  for part in parts[:-1]:
                      node = node.setdefault(part, {})
                  if item['type'] == 'tree':
                      node[parts[-1]] = node.get(parts[-1], {})
                  else:
                      node[parts[-1]] = None
              return tree

          def sort_tree(node):
              if not isinstance(node, dict):
                  return node
              dirs, files = {}, {}
              for name, val in node.items():
                  if isinstance(val, dict):
                      dirs[name] = sort_tree(val)
                  else:
                      files[name] = val
              sorted_node = {}
              sorted_node.update(sorted(dirs.items()))
              sorted_node.update(sorted(files.items()))
              return sorted_node

          def count_files(node):
              if node is None:
                  return 1
              if isinstance(node, dict):
                  return sum(count_files(v) for v in node.values())
              return 0

          def print_tree(node, prefix="", is_last=True, is_root=True, fold_dirs=None):
              if fold_dirs is None:
                  fold_dirs = set()
              if is_root:
                  print(".")
                  new_prefix = ""
              else:
                  connector = "└── " if is_last else "├── "
                  display = node[0]
                  if isinstance(node[1], dict) and node[0] in fold_dirs:
                      n = count_files(node[1])
                      print(prefix + connector + f"{display} ({n} files)")
                      return
                  print(prefix + connector + display)
                  new_prefix = prefix + ("    " if is_last else "│   ")
              if isinstance(node[1], dict):
                  children = list(node[1].items())
                  for i, (name, child) in enumerate(children):
                      print_tree((name, child), new_prefix, i == len(children)-1, False, fold_dirs)

          with open("tree.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          items = data.get("tree", [])
          if not items:
              print("Error: no tree data")
              exit(1)

          raw = build_tree(items)
          sorted_raw = sort_tree(raw)
          print_tree((".", sorted_raw), is_root=True, fold_dirs={"img"})
          EOF

      - name: Insert tree into README
        run: |
          # 删除占位符之间的旧内容，然后插入新树
          sed -i '/<!-- TREE-START -->/,/<!-- TREE-END -->/{//!d}' README.md
          sed -i '/<!-- TREE-START -->/r tree.md' README.md

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto‑update file tree [skip ci]"
